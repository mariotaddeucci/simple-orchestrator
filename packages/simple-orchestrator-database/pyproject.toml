[project]
name = "simple-orchestrator-database"
version = "0.1.0"
description = "SQLite database layer for simple-orchestrator; implements IOrchestratorRepository from core"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "python-ulid>=3.1.0",
    "simple-orchestrator-core",
    "sqlmodel>=0.0.38",
]

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
