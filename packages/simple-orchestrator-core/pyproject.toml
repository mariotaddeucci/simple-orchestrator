[project]
name = "simple-orchestrator-core"
version = "0.1.0"
description = "Core models + REST API interfaces for simple-orchestrator"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.13.3",
    "pydantic-settings>=2.14.0",
    "sqlmodel>=0.0.38",
]

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
