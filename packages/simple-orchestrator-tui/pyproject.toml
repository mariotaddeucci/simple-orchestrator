[project]
name = "simple-orchestrator-tui"
version = "0.1.0"
description = "TUI client for simple-orchestrator worker API"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "simple-orchestrator-api-client",
    "simple-orchestrator-core",
    "textual>=3.0.0",
]

[project.scripts]
simple-orchestrator-tui = "simple_orchestrator_tui:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
