[project]
name = "simple-orchestrator-tui"
version = "0.1.0"
description = "TUI client for simple-orchestrator worker API"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "simple-orchestrator-api-client",
    "simple-orchestrator-core",
    "textual>=3.0.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "simple-orchestrator-database",
    "simple-orchestrator-worker",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[project.scripts]
simple-orchestrator-tui = "simple_orchestrator_tui:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
