[project]
name = "simple-orchestrator-webapi"
version = "0.1.0"
description = "REST API (FastAPI) that mediates all DB access for simple-orchestrator"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "anyio>=4.7.0",
    "fastapi>=0.115.0",
    "pydantic>=2.13.3",
    "python-ulid>=3.1.0",
    "simple-orchestrator-core",
    "simple-orchestrator-database",
    "sqlmodel>=0.0.38",
    "uvicorn>=0.35.0",
]

[dependency-groups]
dev = [
    "anyio[trio]>=4.7.0",
    "pytest>=9.0.3",
    "simple-orchestrator-api-client",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m 'not integration'"
markers = [
    "integration: tests that require live external services (copilot, claude, opencode)",
]

[project.scripts]
simple-orchestrator-webapi = "simple_orchestrator_webapi.webapi_cli:main"

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
