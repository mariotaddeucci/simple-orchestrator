[project]
name = "simple-orchestrator-api-client"
version = "0.1.0"
description = "Async httpx client for simple-orchestrator Web API"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28.1",
    "simple-orchestrator-core",
]

[dependency-groups]
dev = [
    "anyio[trio]>=4.7.0",
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m 'not integration'"
markers = [
    "integration: tests that require live external services (copilot, claude, opencode)",
]

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
