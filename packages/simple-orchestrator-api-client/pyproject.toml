[project]
name = "simple-orchestrator-api-client"
version = "0.1.0"
description = "Async httpx client for simple-orchestrator Web API"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "httpx>=0.28.1",
    "simple-orchestrator-core",
]

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"
