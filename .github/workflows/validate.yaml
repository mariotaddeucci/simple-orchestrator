name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run prek on all files
        run: uv run prek run --all-files

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - simple-orchestrator-core
          - simple-orchestrator-api-client
          - simple-orchestrator-webapi
          - simple-orchestrator-worker
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run tests (${{ matrix.package }})
        run: uv --directory packages/${{ matrix.package }} run pytest --tb=short -q
