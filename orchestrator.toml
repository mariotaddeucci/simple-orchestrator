# orchestrator.toml — commit this file to version-control your agents and settings.
# Override which file to load: ORCHESTRATOR_TOML_FILE=/path/to/other.toml

db_path             = "orchestrator.db"
logs_dir            = "logs"
log_level           = "INFO"          # DEBUG | INFO | WARNING | ERROR | CRITICAL
max_active_sessions = 4
default_task_timeout_minutes = 30.0
poll_interval_seconds = 1.0

# Shared API key used by TUI + worker to talk to the Web API.
# Override via env: ORCHESTRATOR_API_KEY="..."
api_key = "change-me"

# Web API (uv run simple-orchestrator webapi).
webapi_host = "127.0.0.1"
webapi_port = 8765

# Optional MCP server (not started by default).
mcp_server_host = "127.0.0.1"
mcp_server_port = 8766

# ── Global MCP servers (available to all agents) ─────────────────────────────

[mcp_servers.filesystem]
type    = "stdio"
command = "npx"
args    = ["-y", "@modelcontextprotocol/server-filesystem", "."]

# Orchestrator MCP server — connects to the SSE endpoint started by `simple-orchestrator start`.
# Add globally here to expose to ALL agents, or per-agent under
# [agents.<id>.mcp_servers.orchestrator] for only the delegator agent.
[mcp_servers.orchestrator]
type = "sse"
url  = "http://127.0.0.1:8766/sse"

# [mcp_servers.github]
# type = "sse"
# url  = "http://localhost:3001/sse"

# Local FastMCP app — loaded via importlib (no separate process to manage).
# import_path uses the "module.path:attribute" notation.
# [mcp_servers.my_tools]
# type        = "local"
# import_path = "my_package.tools:mcp"

# ── Global skills (available to all agents) ───────────────────────────────────

skills = []

# ── Pollings ──────────────────────────────────────────────────────────────────
# Each [[pollings]] entry enqueues a prompt to an agent on a fixed interval.
# On app start all pollings fire immediately, then repeat every interval_minutes.
# Duplicate guard: skips enqueue if identical (agent_id + prompt) is already
# pending or running in the queue.
#
# [[pollings]]
# agent_id         = "reviewer"
# prompt           = "Review recent git changes and report issues."
# interval_minutes = 30

# ── Agents ────────────────────────────────────────────────────────────────────
# Agents are now stored in the database.
# Use the Web API endpoints to manage them (examples):
#   POST /agents  (upsert)
#   GET  /agents
#   GET  /agents/{id}

# Example delegator agent — pulls tasks from an external source (e.g. via MCP)
# and distributes them to the right agents via the orchestrator MCP server.
#
# [agents.delegator]
# name     = "Task Delegator"
# nickname = "delegator"
# vendor   = "claude_code"
# model    = "claude-sonnet-4-6"
# workdir  = "."
# prompt_file = "prompts/delegator.md"
#
# [agents.delegator.mcp_servers.orchestrator]
# type = "sse"
# url  = "http://127.0.0.1:8765/sse"

