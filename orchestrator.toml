# orchestrator.toml — infrastructure parameters only.
# Agents, MCPs, and events are managed via the REST API (POST /agents, /mcps, /events).
# Override which file to load: ORCHESTRATOR_TOML_FILE=/path/to/other.toml

db_path             = "orchestrator.db"
logs_dir            = "logs"
log_level           = "INFO"          # DEBUG | INFO | WARNING | ERROR | CRITICAL
max_active_sessions = 4
default_task_timeout_minutes = 30.0
poll_interval_seconds = 1.0

# Shared API key used by TUI + worker to talk to the Web API.
# Override via env: ORCHESTRATOR_API_KEY="..."
api_key = "change-me"

# Web API (uv run simple-orchestrator webapi).
webapi_host = "127.0.0.1"
webapi_port = 8765
